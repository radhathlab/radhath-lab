<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radhath LAB</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="app">

<div class="logo">
رذاذ LAB
</div>

<div class="subtitle">
Perfume Formula System
</div>


<div class="card">

<h2>🧪 مختبر التركيب</h2>

<input id="formulaName" placeholder="اسم التركيبة">


<select id="bottleSize">
<option value="10">10 ml</option>
<option value="30">30 ml</option>
<option value="50">50 ml</option>
<option value="100">100 ml</option>
</select>


<hr>


<input id="ingredientName" placeholder="اسم العطر">

<input id="ingredientPercent" type="number" placeholder="النسبة %">


<button onclick="addIngredient()">
إضافة المكون
</button>


<div id="ingredients" class="formula-box">
لا يوجد مكونات
</div>


<div id="total" class="gold">
المجموع: 0%
</div>


<button onclick="saveFormula()">
حفظ التركيبة
</button>


</div>



<div class="card">

<h2>📚 الوصفات المحفوظة</h2>

<div id="saved">
لا توجد وصفات
</div>

</div>


<div class="footer">
Radhath LAB © 2026
</div>


</div>




<script src="app.js"></script>


<script>

let ingredients=[];


function addIngredient(){

let name =
document.getElementById("ingredientName").value;


let percent =
Number(document.getElementById("ingredientPercent").value);



if(!name || !percent){

alert("اكتب اسم العطر والنسبة");

return;

}


ingredients.push({

name:name,

percent:percent

});


showIngredients();

}



function showIngredients(){

let box =
document.getElementById("ingredients");


let total = 0;


box.innerHTML="";


ingredients.forEach(item=>{

total += Number(item.percent);


box.innerHTML +=
item.name+" - "+item.percent+"%<br>";

});


document.getElementById("total").innerHTML =
"المجموع: "+total+"%";

}



function saveFormula(){

let name =
document.getElementById("formulaName").value;


let size =
document.getElementById("bottleSize").value;



let result =
RadhathLAB.createFormula(
name,
size,
ingredients
);



if(result.error){

alert(result.error);

return;

}



let saved =
document.getElementById("saved");


saved.innerHTML +=
`
<div class="formula-box">
<h3>${result.name}</h3>
الحجم: ${result.size} ml
<br><br>
${result.ingredients.map(i=>
i.name+" : "+i.ml+" ml"
).join("<br>")}

</div>
`;



alert("تم حفظ التركيبة بنجاح");


}


window.onload = function(){

let savedBox = document.getElementById("saved");

let formulas = RadhathLAB.loadFormulas();


if(formulas.length > 0){

savedBox.innerHTML="";


formulas.forEach(result=>{


savedBox.innerHTML +=
`
<div class="formula-box">

<h3>${result.name}</h3>

الحجم: ${result.size} ml

<br><br>

${result.ingredients.map(i=>
i.name+" : "+i.ml+" ml"
).join("<br>")}

</div>
`;

});


}

}
</script>


</body>

</html>
