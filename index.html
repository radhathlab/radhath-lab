<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radhath LAB - Perfume Formula System</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header class="hero">

<h1>🧪 Radhath LAB</h1>

<p>Perfume Formula System</p>

</header>



<section class="card">

<h2>✨ إنشاء تركيبة جديدة</h2>


<input id="formulaName" placeholder="اسم التركيبة">


<input id="clientName" placeholder="اسم العميل">


<input id="perfumeName" placeholder="اسم العطر النهائي">



<select id="bottleSize">

<option value="10">10 ml</option>

<option value="30">30 ml</option>

<option value="50">50 ml</option>

<option value="100">100 ml</option>

</select>



<h3>المكونات</h3>


<input id="ingredientName" placeholder="اسم المكون">


<input id="ingredientPercent" type="number" placeholder="النسبة %">



<button onclick="addIngredient()">
➕ إضافة مكون
</button>



<div id="ingredients" class="formula-box">

لا يوجد مكونات

</div>



<div id="total" class="total">

المجموع: 0%

</div>



<button onclick="saveFormula()">

💾 حفظ التركيبة

</button>


</section>




<section class="card">


<h2>⭐ مواصفات العطر</h2>



<select id="strength">

<option>ثبات قوي</option>

<option>ثبات متوسط</option>

<option>ثبات خفيف</option>

</select>




<select id="projection">

<option>فوحان قوي</option>

<option>فوحان متوسط</option>

<option>فوحان خفيف</option>

</select>


<section class="card">

<h2>📚 الوصفات المحفوظة</h2>

<input id="searchBox" placeholder="🔍 ابحث عن وصفة أو عميل أو عطر" oninput="searchFormulas()">


<div id="saved">

لا توجد وصفات

</div>


</section>



</div>



<script src="app.js"></script>


<script>


let ingredients = [];



function addIngredient(){


let name = document.getElementById("ingredientName").value;

let percent = Number(document.getElementById("ingredientPercent").value);



if(!name || !percent){

alert("أدخل اسم المكون والنسبة");

return;

}



ingredients.push({

name:name,

percent:percent

});



renderIngredients();


document.getElementById("ingredientName").value="";

document.getElementById("ingredientPercent").value="";


}




function renderIngredients(){


let box=document.getElementById("ingredients");

box.innerHTML="";


let total=0;



ingredients.forEach(item=>{


total += item.percent;


box.innerHTML +=

`<div>
${item.name} - ${item.percent}%
</div>`;



});



document.getElementById("total").innerHTML =

"المجموع: "+total+"%";


}




function saveFormula(){

let formula = RadhathLAB.createFormula(

document.getElementById("formulaName").value,

document.getElementById("bottleSize").value,

ingredients

);


if(formula.error){

alert(formula.error);

return;

}


formula.client =
document.getElementById("clientName").value;


formula.perfume =
document.getElementById("perfumeName").value;


formula.strength =
document.getElementById("strength").value;


formula.projection =
document.getElementById("projection").value;



let formulas = RadhathLAB.loadFormulas();


let oldIndex = formulas.findIndex(f => f.name === formula.name);


if(oldIndex !== -1){

formulas[oldIndex] = formula;

}else{

formulas.push(formula);

}



RadhathLAB.formulas = formulas;


localStorage.setItem(

"radhath_formulas",

JSON.stringify(formulas)

);



document.getElementById("saved").innerHTML="";


formulas.forEach(item=>{

showFormula(item);

});


alert("تم حفظ التعديل بنجاح");


}





function showFormula(item){


let saved=document.getElementById("saved");



if(saved.innerHTML.includes("لا توجد وصفات")){

saved.innerHTML="";

}




let card=document.createElement("div");

card.className="formula-box";



card.innerHTML=`

<h2>🧪 Radhath LAB</h2>

<hr>

<h3>${item.name}</h3>


العطر:
${item.perfume || "-"}

<br>

العميل:
${item.client || "-"}

<br>

الحجم:
${item.size} ml

<br><br>


الثبات:
${item.strength}

<br>

الفوحان:
${item.projection}

<br><br>


<b>المكونات:</b>

<br>

${item.ingredients.map(i=>

i.name+" : "+i.ml+" ml"

).join("<br>")}


<br><br>

<button onclick="printFormula(this)">
🖨️ طباعة
</button>


<button onclick="copyFormula(this)">
📋 نسخ
</button>

<button onclick="editFormula('${item.name}')">
✏️ تعديل
</button>
<button onclick="this.parentElement.remove()">
🗑️ حذف من العرض
</button>


`;



saved.prepend(card);



}
  function printFormula(btn){

let content = btn.parentElement.innerHTML;


let win = window.open("");


win.document.write(`

<html>

<head>

<title>Radhath LAB</title>

</head>

<body dir="rtl">

${content}

</body>

</html>

`);


win.print();


}




function copyFormula(btn){


let text = btn.parentElement.innerText;


navigator.clipboard.writeText(text);


alert("تم نسخ الوصفة");


}


function searchFormulas(){

let text = document.getElementById("searchBox").value.toLowerCase();

let saved = document.getElementById("saved");

saved.innerHTML="";


let old = RadhathLAB.loadFormulas();


old.filter(item =>

(item.name && item.name.toLowerCase().includes(text)) ||

(item.client && item.client.toLowerCase().includes(text)) ||

(item.perfume && item.perfume.toLowerCase().includes(text))

).forEach(item => {

showFormula(item);

});


}

function editFormula(name){

let formulas = RadhathLAB.loadFormulas();

let item = formulas.find(f => f.name === name);


if(!item){

alert("لم يتم العثور على الوصفة");

return;

}


document.getElementById("formulaName").value = item.name || "";

document.getElementById("clientName").value = item.client || "";

document.getElementById("perfumeName").value = item.perfume || "";

document.getElementById("bottleSize").value = item.size || "100";


/* تنظيف المكونات قبل تحميل الوصفة */
ingredients = [];


item.ingredients.forEach(i => {

ingredients.push({

name: i.name,

percent: i.percent

});

});


renderIngredients();


window.scrollTo({

top:0,

behavior:"smooth"

});


}
window.onload=function(){


let old = RadhathLAB.loadFormulas();


old.forEach(item=>{


showFormula(item);


});


}



</script>


</body>


</html>
