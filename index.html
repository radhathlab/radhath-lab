<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radhath LAB</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">

<div class="logo">
رذاذ LAB
</div>

<div class="subtitle">
Perfume Formula System
</div>


<div class="card">

<h2>🧪 إنشاء تركيبة</h2>

<input id="formulaName" placeholder="اسم التركيبة">

<select id="bottleSize">
<option value="10">10 ml</option>
<option value="30">30 ml</option>
<option value="50">50 ml</option>
<option value="100">100 ml</option>
</select>


<input id="ingredientName" placeholder="اسم العطر">

<input id="ingredientPercent" placeholder="النسبة %">


<button onclick="addIngredient()">
إضافة العطر
</button>


<div id="ingredients" class="formula-box"></div>


<button onclick="saveFormula()">
حفظ التركيبة
</button>


</div>



<div class="card">

<h2>📚 الوصفات المحفوظة</h2>

<div id="saved"></div>

</div>


<div class="footer">
Radhath LAB © 2026
</div>


</div>



<script src="app.js"></script>


<script>

let ingredients=[];


function addIngredient(){

let name=document.getElementById("ingredientName").value;

let percent=document.getElementById("ingredientPercent").value;


ingredients.push({

name:name,
percent:percent

});


showIngredients();

}



function showIngredients(){

let box=document.getElementById("ingredients");

box.innerHTML="";


ingredients.forEach(i=>{

box.innerHTML += 
i.name+" - "+i.percent+"%<br>";

});


}



function saveFormula(){

let name=document.getElementById("formulaName").value;

let size=document.getElementById("bottleSize").value;


let result=RadhathLAB.createFormula(
name,
size,
ingredients
);


alert(JSON.stringify(result,null,2));


}


</script>


</body>

</html>
