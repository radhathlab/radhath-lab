<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radhath LAB - Perfume Formula System</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div class="logo">
رذاذ LAB
</div>


<div class="subtitle">
Premium Perfume Formula System
</div>



<div class="card">

<h2>🧪 مختبر العطر</h2>


<input id="formulaName" placeholder="اسم التركيبة">


<input id="clientName" placeholder="اسم العميل">


<input id="perfumeName" placeholder="اسم العطر النهائي">



<select id="bottleSize">

<option value="10">10 ml</option>

<option value="30">30 ml</option>

<option value="50">50 ml</option>

<option value="100">100 ml</option>

</select>



<input id="ingredientName" placeholder="اسم المكون">


<input id="ingredientPercent" type="number" placeholder="النسبة %">



<button onclick="addIngredient()">

إضافة مكون

</button>



<div id="ingredients" class="formula-box">

لا يوجد مكونات

</div>



<div id="total" class="gold">

المجموع: 0%

</div>



<button onclick="saveFormula()">

حفظ التركيبة

</button>


</div>




<div class="card">


<h2>⭐ تقييم العطر</h2>


<select id="strength">

<option>ثبات قوي</option>

<option>ثبات متوسط</option>

<option>ثبات خفيف</option>

</select>



<select id="projection">

<option>فوحان قوي</option>

<option>فوحان متوسط</option>

<option>فوحان خفيف</option>

</select>


</div>




<div class="card">


<h2>📚 الوصفات المحفوظة</h2>


<div id="saved">

لا توجد وصفات

</div>


</div>



</div>
<script src="app.js"></script>


<script>


let ingredients=[];



function addIngredient(){


let name =
document.getElementById("ingredientName").value;


let percent =
Number(document.getElementById("ingredientPercent").value);



if(!name || !percent){

alert("اكتب اسم المكون والنسبة");

return;

}



ingredients.push({

name:name,

percent:percent

});



showIngredients();


document.getElementById("ingredientName").value="";

document.getElementById("ingredientPercent").value="";


}




function showIngredients(){


let box =
document.getElementById("ingredients");


box.innerHTML="";


let total=0;



ingredients.forEach(item=>{


total += Number(item.percent);



box.innerHTML +=

item.name+" - "+item.percent+"%<br>";



});



document.getElementById("total").innerHTML=

"المجموع: "+total+"%";


}





function saveFormula(){



let formula =

RadhathLAB.createFormula(

document.getElementById("formulaName").value,

document.getElementById("bottleSize").value,

ingredients

);



if(formula.error){


alert(formula.error);

return;

}



formula.client =

document.getElementById("clientName").value;



formula.perfume =

document.getElementById("perfumeName").value;



formula.strength =

document.getElementById("strength").value;



formula.projection =

document.getElementById("projection").value;




localStorage.setItem(

"radhath_formulas",

JSON.stringify(RadhathLAB.formulas)

);



displayFormula(formula);



alert("تم حفظ التركيبة بنجاح");


}




function displayFormula(item){



let saved =

document.getElementById("saved");



if(saved.innerHTML.includes("لا توجد")){

saved.innerHTML="";

}



saved.innerHTML +=


`

<div class="formula-box">


<h2 class="gold">
Radhath LAB
</h2>


<hr>


<h3>
${item.name}
</h3>


العطر:

${item.perfume || "-"}


<br><br>


العميل:

${item.client || "-"}


<br><br>


الحجم:

${item.size} ml


<br><br>


الثبات:

${item.strength}


<br>


الفوحان:

${item.projection}


<br><br>


<strong>
المكونات:
</strong>


<br>


${item.ingredients.map(i=>

i.name+" : "+i.ml+" ml"

).join("<br>")}



<br><br>


رقم الخلطة:

${item.id}


<br>


التاريخ:

${item.date}



</div>


`;



}





window.onload=function(){



let old =

RadhathLAB.loadFormulas();



old.forEach(item=>{


displayFormula(item);


});


}



</script>


</body>

</html>
