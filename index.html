<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radhath LAB - Perfume Formula System</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header class="hero">

<h1>🧪 Radhath LAB</h1>

<p>Perfume Formula System</p>

</header>




<section class="card">

<h2>✨ إنشاء تركيبة جديدة</h2>


<input id="formulaName" placeholder="اسم التركيبة">


<input id="clientName" placeholder="اسم العميل">


<input id="perfumeName" placeholder="اسم العطر">



<select id="bottleSize">

<option value="10">10 ml</option>

<option value="30">30 ml</option>

<option value="50">50 ml</option>

<option value="100">100 ml</option>

</select>



<h3>إضافة مكون</h3>



<input id="ingredientName" placeholder="اسم المادة">


<input id="ingredientPercent" type="number" placeholder="النسبة %">


<input id="ingredientPrice" type="number" placeholder="السعر لكل 100 مل">



<button onclick="addIngredient()">

➕ إضافة مكون

</button>



<div id="ingredients" class="formula-box">

لا يوجد مكونات

</div>



<div id="total" class="total">

المجموع: 0%

</div>
<section class="card">

<h2>💰 التكلفة والربح</h2>


<input id="sellPrice" type="number" placeholder="سعر البيع بالدينار">


<div class="formula-box">

<div id="costResult">
التكلفة: 0 دينار
</div>


<div id="profitResult">
الربح: 0 دينار
</div>


</div>



<button onclick="saveFormula()">

💾 حفظ التركيبة

</button>


</section>





<section class="card">

<h2>📚 الوصفات المحفوظة</h2>


<div id="saved">

لا توجد وصفات

</div>


</section>



</div>



<script src="app.js"></script>



<script>


let ingredients = [];



function addIngredient(){


let name =
document.getElementById("ingredientName").value;


let percent =
Number(document.getElementById("ingredientPercent").value);


let price =
Number(document.getElementById("ingredientPrice").value);



if(!name || !percent){

alert("أدخل اسم المادة والنسبة");

return;

}



ingredients.push({

name:name,

percent:percent,

price:price

});



renderIngredients();



}




function renderIngredients(){


let box =
document.getElementById("ingredients");


box.innerHTML="";


let total=0;



ingredients.forEach(item=>{


total += item.percent;



box.innerHTML += `

<div>

${item.name}

-

${item.percent}%

-

${item.price} دينار / 100 مل

</div>

`;



});



document.getElementById("total").innerHTML =

"المجموع: "+total+"%";



}

</section>
  
function saveFormula(){


let formula = RadhathLAB.createFormula(

document.getElementById("formulaName").value,

document.getElementById("bottleSize").value,

ingredients

);



if(formula.error){

alert(formula.error);

return;

}



formula.client =
document.getElementById("clientName").value;



formula.perfume =
document.getElementById("perfumeName").value;



formula.sellPrice =
Number(document.getElementById("sellPrice").value || 0);



RadhathLAB.calculateCost(formula);



localStorage.setItem(

"radhath_formulas",

JSON.stringify(RadhathLAB.formulas)

);



showFormula(formula);



alert("تم حفظ التركيبة بنجاح");


}




function showFormula(item){


let saved =
document.getElementById("saved");



if(saved.innerHTML.includes("لا توجد وصفات")){

saved.innerHTML="";

}



let card =
document.createElement("div");



card.className="formula-box";



let cost =
Number(item.cost || 0);



let profit =
Number(item.profit || 0);



card.innerHTML = `


<h2>🧪 Radhath LAB</h2>


<hr>


<h3>${item.name}</h3>


العطر:
${item.perfume || "-"}

<br>


العميل:
${item.client || "-"}

<br>


الحجم:
${item.size} ml


<br><br>


<b>المكونات:</b>

<br>


${item.ingredients.map(i =>

i.name+" : "+i.percent+"%"

).join("<br>")}


<br><br>


💰 التكلفة:
${cost.toFixed(2)} دينار


<br>


💵 البيع:
${item.sellPrice || 0} دينار


<br>


📈 الربح:
${profit.toFixed(2)} دينار


<br><br>


<button onclick="window.print()">

🖨️ طباعة

</button>



<button onclick="navigator.clipboard.writeText(this.parentElement.innerText)">

📋 نسخ

</button>


`;


saved.prepend(card);


}




window.onload=function(){


let old =
RadhathLAB.loadFormulas();



old.forEach(item=>{

showFormula(item);

});


}



</script>


</body>


</html>
